# Forestgump - Triển khai production trên VPS (cảnh báo thiên tai Điện Biên).
#
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml ps
#   docker compose -f docker-compose.prod.yml logs -f backend
#
# Cần file .env (xem .env.prod.example) đặt cạnh file này.
# Kiến trúc:
#   Internet --443/80--> caddy --(reverse proxy)--> backend:3000   (HTTPS tự động)
#   backend --> ai_engine:8000 (nội bộ, POST /assess-risk)
#   backend --> Open-Meteo / OpenWeatherMap / NCHMF (ra Internet, không lưu DB)
# Không có DB/MQTT — pipeline tính on-the-fly mỗi request (xem docs/architecture.md).

services:
  ai_engine:
    build: ./ai_engine
    container_name: forestgump-ai
    restart: unless-stopped
    # Không publish cổng — chỉ backend gọi nội bộ.

  backend:
    build: ./backend
    container_name: forestgump-backend
    restart: unless-stopped
    depends_on:
      ai_engine:
        condition: service_started
    environment:
      AI_ENGINE_BASE_URL: http://ai_engine:8000
      API_PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN}
      OPENWEATHERMAP_API_KEY: ${OPENWEATHERMAP_API_KEY}
      # Chat widget (POST /api/chat) — để trống nếu chưa dùng tính năng chat,
      # backend tự trả 503 cho route đó, không ảnh hưởng phần còn lại.
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
    # Không publish 3000 — Caddy reverse proxy.

  caddy:
    image: caddy:2-alpine
    container_name: forestgump-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend

volumes:
  caddy-data:
  caddy-config:
