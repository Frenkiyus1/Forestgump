# Cấu hình Mosquitto cho PRODUCTION.
# - Listener nội bộ 1883: chỉ trong mạng docker (backend subscribe), KHÔNG publish.
# - Listener 8883: MQTT over TLS, public cho thiết bị ESP32 qua 4G, yêu cầu đăng nhập.

per_listener_settings true

# --- Nội bộ (backend <-> broker trong docker network) ---
listener 1883
allow_anonymous true

# --- Công khai có TLS (thiết bị ngoài hiện trường) ---
listener 8883
allow_anonymous false
password_file /mosquitto/config/passwd

# Chứng chỉ TLS phía server (lấy từ Let's Encrypt / certbot - xem DEPLOY.md).
certfile /mosquitto/certs/fullchain.pem
keyfile /mosquitto/certs/privkey.pem

# --- TẠM: công khai KHÔNG TLS (demo khi chưa xin được cert - xem DEPLOY.md mục A.3).
# Vẫn yêu cầu user/pass (dùng chung file passwd) chứ không mở anonymous ra Internet.
# XOÁ listener này khi cert 8883 ở trên đã chạy được.
listener 1884
allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/
